name: Deploy Synchron-Backend on EC2

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          ENV_FILE: ${{ secrets.ENV_FILE }}

        run: |

          echo "$DEPLOY_KEY" > deploy_key.pem
          chmod 600 deploy_key.pem

          echo "Copying deploy key to EC2..."

          scp -o StrictHostKeyChecking=no \
            deploy_key.pem \
            ec2-user@$EC2_HOST:/home/ec2-user/.ssh/deploy_key.pem

          rm -f deploy_key.pem

          echo "Connecting to EC2..."

          ssh -o StrictHostKeyChecking=no ec2-user@$EC2_HOST << 'ENDSSH'

            set -e

            cd /home/ec2-user

            echo "Setting SSH permissions..."

            mkdir -p ~/.ssh
            chmod 700 ~/.ssh
            chmod 600 ~/.ssh/deploy_key.pem

            echo "Starting SSH Agent..."

            eval $(ssh-agent -s)
            ssh-add ~/.ssh/deploy_key.pem

            echo "Adding GitHub to known hosts..."

            ssh-keyscan -H github.com >> ~/.ssh/known_hosts

            echo "Configuring Git..."

            git config --global user.name "EC2 Deployer"
            git config --global user.email "ec2-deploy@synchron.com"

            echo "Checking Docker Compose..."

            docker compose version

            echo "Checking repository..."

            if [ ! -d "Synchron-Backend" ]; then

              echo "Cloning repository for first time..."

              git clone git@github.com:ayushsingh212/Synchron-Backend.git

              cd Synchron-Backend

            else

              echo "Pulling latest code..."

              cd Synchron-Backend

              git fetch origin
              git reset --hard origin/master
              git clean -fd

            fi

            echo "Writing .env file..."

            cat > .env << ENVEOF
${ENV_FILE}
ENVEOF

            echo "Stopping existing containers..."

            docker compose down --remove-orphans || true

            echo "Removing all containers..."

            docker rm -f $(docker ps -aq) || true

            echo "Removing all Docker images..."

            docker rmi -f $(docker images -aq) || true

            echo "Removing unused Docker volumes..."

            docker volume prune -f || true

            echo "Removing Docker builder cache..."

            docker builder prune -af || true

            echo "Removing unused Docker networks..."

            docker network prune -f || true

            echo "Performing final Docker cleanup..."

            docker system prune -af --volumes || true

            echo "Checking free disk space..."

            df -h

            echo "Building fresh containers..."

            docker compose build --no-cache

            echo "Starting containers..."

            docker compose up -d

            echo "Waiting for containers to start..."

            sleep 15

            echo "Showing running containers..."

            docker ps

            echo "Showing recent logs..."

            docker compose logs --tail=50

            echo "Deployment completed successfully!"

          ENDSSH