name: Deploy Synchron-Backend on EC2

on:
  push:
    branches:
      - master

# Prevent two deploys running at the same time
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30    # kill runaway jobs
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4    # v3 deprecated

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.8.0    # v0.7.0 has known bugs
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: |
          # ── Transfer .env via SSH pipe ──────────────────────────────────
          printf '%s' "$ENV_FILE" > app.env
          chmod 600 app.env

          echo "Transferring .env to EC2..."
          cat app.env | ssh -o StrictHostKeyChecking=no ubuntu@$EC2_HOST 'cat > /home/ubuntu/app.env'
          
          rm -f app.env

          echo "Connecting to EC2 to start deploy..."

          ssh -o StrictHostKeyChecking=no ubuntu@$EC2_HOST << 'ENDSSH'

            set -euo pipefail

            DEPLOY_SHA="${{ github.sha }}"
            APP_DIR="/home/ubuntu/Synchron-Backend"

            echo "=== Deploy $DEPLOY_SHA ==="

            # ── GitHub SSH setup (Uses the server's default SSH key) ────────
            mkdir -p ~/.ssh
            chmod 700 ~/.ssh
            ssh-keyscan -H github.com 2>/dev/null >> ~/.ssh/known_hosts
            sort -u ~/.ssh/known_hosts -o ~/.ssh/known_hosts

            # ── Clone or pull ────────────────────────────────────────────────
            if [ ! -d "$APP_DIR" ]; then
              echo "First deploy — cloning..."
              # Note: This requires the server's public key to be in GitHub Deploy Keys
              git clone git@github.com:ayushsingh212/Synchron-Backend.git "$APP_DIR"
            fi

            cd "$APP_DIR"

            echo "Pulling latest code..."
            git fetch origin
            git reset --hard origin/master
            git clean -fd

            # ── Write .env (already copied via scp) ─────────────────────────
            mv /home/ubuntu/app.env .env
            chmod 600 .env
            echo ".env written: $(wc -l < .env) lines"

            # ── Stop and Cleanup ───────────────────────────────
            echo "Stopping existing containers..."
            docker compose down --remove-orphans --timeout 30 || true

            echo "Full Docker cleanup..."
            docker system prune -af --volumes || true

            # ── Build and Start ───────────────────────────────────────────────
            echo "Building images..."
            docker compose build --no-cache --pull

            echo "Starting containers..."
            docker compose up -d --force-recreate

            # ── Health check ──────────────────────────────────────────────────
            echo "Waiting for containers to become healthy..."
            MAX_WAIT=120
            ELAPSED=0
            while [ $ELAPSED -lt $MAX_WAIT ]; do
              # Check for unhealthy containers
              UNHEALTHY=$(docker ps --filter "health=unhealthy" --format "{{.Names}}")
              if [ -n "$UNHEALTHY" ]; then
                echo "UNHEALTHY containers: $UNHEALTHY"
                docker compose logs --tail=80
                exit 1
              fi

              # Check if any are still starting
              STARTING=$(docker ps --filter "health=starting" --format "{{.Names}}")
              if [ -z "$STARTING" ]; then
                echo "All containers healthy after ${ELAPSED}s"
                break
              fi

              sleep 5
              ELAPSED=$((ELAPSED + 5))
            done

            # ── Final status ────────────────────────────────────────────────
            echo "=== Running containers ==="
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
            echo "=== Deploy $DEPLOY_SHA complete ==="

          ENDSSH