name: Deploy Synchron-Backend on EC2

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup SSH for EC2
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          echo "$DEPLOY_KEY" > deploy_key.pem
          chmod 600 deploy_key.pem

          scp -o StrictHostKeyChecking=no deploy_key.pem ec2-user@$EC2_HOST:/home/ec2-user/.ssh/deploy_key.pem

          rm -f deploy_key.pem

          ssh -o StrictHostKeyChecking=no ec2-user@$EC2_HOST << 'EOF'

            set -e

            cd /home/ec2-user

            echo "Setting up Git Deploy Key..."

            chmod 600 ~/.ssh/deploy_key.pem

            eval $(ssh-agent -s)
            ssh-add ~/.ssh/deploy_key.pem

            git config --global user.name "EC2 Deployer"
            git config --global user.email "ec2-deploy@synchron.com"

            mkdir -p ~/.ssh
            ssh-keyscan -H github.com >> ~/.ssh/known_hosts

            if [ ! -d "Synchron-Backend" ]; then
              echo "Cloning repo for the first time..."
              git clone git@github.com:ayushsingh212/Synchron-Backend.git
              cd Synchron-Backend
            else
              echo "Pulling latest code..."
              cd Synchron-Backend
              git pull origin master
            fi

            echo "Stopping old containers..."
            docker compose down --remove-orphans

            echo "Removing unused docker resources..."
            docker system prune -af

            echo "Building and starting containers..."
            docker compose up -d --build

            echo "Deployment completed successfully!"

          EOF