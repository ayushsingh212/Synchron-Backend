name: Deploy Synchron-Backend to EC2

on:
  push:
    branches:
      - master

concurrency:
  group: production-deploy           # FIX: prevent overlapping deploys
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20           # FIX: kill runaway jobs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4    # FIX: v3 is deprecated

      - name: Add EC2 to known hosts   # FIX: do this once, on the runner
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}

      - name: Setup SSH Agent          # FIX: agent lives on runner, not EC2
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          ENV_FILE:  ${{ secrets.ENV_FILE }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          # FIX: pipe ENV_FILE in via stdin — no temp files, no shell injection
          printf '%s' "$ENV_FILE" | ssh -o StrictHostKeyChecking=no \
            -o ForwardAgent=yes \
            ec2-user@"$EC2_HOST" \
            "bash -s -- $GITHUB_SHA" << 'ENDSSH'

            set -euo pipefail          # FIX: treat unset vars as errors too
            DEPLOY_SHA="$1"
            APP_DIR="/home/ec2-user/Synchron-Backend"

            echo "=== Deploy: $DEPLOY_SHA ==="

            # ── SSH / Git setup ──────────────────────────────────────────
            mkdir -p ~/.ssh
            chmod 700 ~/.ssh
            # FIX: add GitHub once, skip if already present
            ssh-keyscan -H github.com 2>/dev/null | sort -u - ~/.ssh/known_hosts \
              | uniq -u >> ~/.ssh/known_hosts || true

            # ── Clone or update ──────────────────────────────────────────
            if [ ! -d "$APP_DIR/.git" ]; then
              echo "First deploy — cloning..."
              git clone git@github.com:ayushsingh212/Synchron-Backend.git "$APP_DIR"
            fi

            cd "$APP_DIR"
            echo "Pulling latest code..."
            git fetch origin
            git reset --hard origin/master
            git clean -fd

            # ── Write .env from stdin ────────────────────────────────────
            # FIX: read piped content; single-quoted heredoc blocked expansion
            cat - > .env
            chmod 600 .env
            echo ".env written ($(wc -l < .env) lines)"

            # ── Docker cleanup ───────────────────────────────────────────
            echo "Stopping old containers..."
            docker compose down --remove-orphans --timeout 30 || true

            echo "Removing stopped containers..."
            docker container prune -f || true

            echo "Removing old images..."
            # FIX: tag-based removal is safer; fall back to full image prune
            docker image prune -af || true

            echo "Pruning volumes not in use..."
            docker volume prune -f || true

            echo "Clearing build cache..."
            docker builder prune -af || true

            echo "Final system prune (no volumes — they were handled above)..."
            docker system prune -af || true

            echo "Disk space after cleanup:"
            df -h /

            # ── Build & start ────────────────────────────────────────────
            echo "Building images..."
            docker compose build --no-cache --pull

            echo "Starting containers..."
            docker compose up -d --force-recreate

            # ── Health check ─────────────────────────────────────────────
            # FIX: poll until healthy instead of blind sleep
            echo "Waiting for containers to be healthy..."
            MAX_WAIT=120
            ELAPSED=0
            INTERVAL=5
            while [ $ELAPSED -lt $MAX_WAIT ]; do
              UNHEALTHY=$(docker ps --filter "health=unhealthy" --format "{{.Names}}")
              STARTING=$(docker ps --filter "health=starting" --format "{{.Names}}")
              if [ -z "$UNHEALTHY" ] && [ -z "$STARTING" ]; then
                echo "All containers healthy!"
                break
              fi
              echo "Still waiting... ($ELAPSED/${MAX_WAIT}s) starting: $STARTING"
              sleep $INTERVAL
              ELAPSED=$((ELAPSED + INTERVAL))
            done

            if [ $ELAPSED -ge $MAX_WAIT ]; then
              echo "TIMEOUT: containers did not become healthy in ${MAX_WAIT}s"
              docker compose logs --tail=100
              exit 1
            fi

            # ── Final status ─────────────────────────────────────────────
            echo "Running containers:"
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

            echo "Recent logs:"
            docker compose logs --tail=50

            echo "=== Deployment of $DEPLOY_SHA complete ==="
          ENDSSH