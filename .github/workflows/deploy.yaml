name: Deploy Synchron-Backend on EC2

on:
  push:
    branches:
      - master

# Prevent two deploys running at the same time
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30    # kill runaway jobs
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4    # v3 deprecated

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.8.0    # v0.7.0 has known bugs
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          ENV_FILE: ${{ secrets.ENV_FILE }}

        run: |
          # ── Write deploy key on runner, copy to EC2, then delete ────────
          echo "$DEPLOY_KEY" > deploy_key.pem
          chmod 600 deploy_key.pem

          echo "Copying deploy key to EC2..."
          scp -o StrictHostKeyChecking=no \
            deploy_key.pem \
            ec2-user@$EC2_HOST:/home/ec2-user/.ssh/deploy_key.pem

          rm -f deploy_key.pem

          # ── Write .env locally, copy to EC2, then delete ────────────────
          # FIX: printf avoids adding a trailing newline that echo adds
          printf '%s' "$ENV_FILE" > app.env
          chmod 600 app.env

          echo "Copying .env to EC2..."
          scp -o StrictHostKeyChecking=no \
            app.env \
            ec2-user@$EC2_HOST:/home/ec2-user/app.env

          rm -f app.env

          echo "Connecting to EC2..."

          # ── Unquoted ENDSSH so $GITHUB_SHA expands on the runner side ───
          ssh -o StrictHostKeyChecking=no ec2-user@$EC2_HOST << ENDSSH

            set -euo pipefail    # FIX: -u catches unbound variables too

            DEPLOY_SHA="${{ github.sha }}"
            APP_DIR="/home/ec2-user/Synchron-Backend"

            echo "=== Deploy \$DEPLOY_SHA ==="

            # ── SSH / deploy key setup ──────────────────────────────────────
            mkdir -p ~/.ssh
            chmod 700 ~/.ssh
            chmod 600 ~/.ssh/deploy_key.pem

            # FIX: deduplicate known_hosts so it doesn't grow on every deploy
            ssh-keyscan -H github.com 2>/dev/null >> ~/.ssh/known_hosts
            sort -u ~/.ssh/known_hosts -o ~/.ssh/known_hosts

            eval \$(ssh-agent -s)
            ssh-add ~/.ssh/deploy_key.pem

            # ── Clone or pull ────────────────────────────────────────────────
            if [ ! -d "\$APP_DIR" ]; then
              echo "First deploy — cloning..."
              git clone git@github.com:ayushsingh212/Synchron-Backend.git "\$APP_DIR"
            fi

            cd "\$APP_DIR"

            echo "Pulling latest code..."
            git fetch origin
            git reset --hard origin/master    # FIX: safer than git pull
            git clean -fd

            # ── Write .env (already copied via scp) ─────────────────────────
            mv /home/ec2-user/app.env .env
            chmod 600 .env
            echo ".env written: \$(wc -l < .env) lines"

            # ── Stop running containers first ───────────────────────────────
            echo "Stopping existing containers..."
            docker compose down --remove-orphans --timeout 30 || true

            # ── Full Docker cleanup to free disk space ───────────────────────
            # Order matters: containers must be stopped before pruning volumes

            echo "Removing stopped containers..."
            docker container prune -f || true

            echo "Removing all unused images..."
            docker image prune -af || true      # -a removes ALL unused, not just dangling

            echo "Removing unused volumes..."
            docker volume prune -f || true      # safe now — containers are stopped

            echo "Clearing build cache..."
            docker builder prune -af || true

            echo "Final system prune..."
            docker system prune -af || true

            echo "=== Disk space after cleanup ==="
            df -h /

            # ── Build fresh ─────────────────────────────────────────────────
            echo "Building images..."
            docker compose build --no-cache --pull    # --pull refreshes base images

            echo "Starting containers..."
            docker compose up -d --force-recreate

            # ── Health check — poll instead of blind sleep ───────────────────
            echo "Waiting for containers to become healthy..."
            MAX_WAIT=120
            ELAPSED=0
            INTERVAL=5

            while [ \$ELAPSED -lt \$MAX_WAIT ]; do
              # Any container in unhealthy state = fail fast
              UNHEALTHY=\$(docker ps --filter "health=unhealthy" --format "{{.Names}}")
              if [ -n "\$UNHEALTHY" ]; then
                echo "UNHEALTHY containers: \$UNHEALTHY"
                docker compose logs --tail=80
                exit 1
              fi

              STARTING=\$(docker ps --filter "health=starting" --format "{{.Names}}")
              if [ -z "\$STARTING" ]; then
                echo "All containers healthy after \${ELAPSED}s"
                break
              fi

              echo "Still starting (\${ELAPSED}/\${MAX_WAIT}s): \$STARTING"
              sleep \$INTERVAL
              ELAPSED=\$((ELAPSED + INTERVAL))
            done

            if [ \$ELAPSED -ge \$MAX_WAIT ]; then
              echo "ERROR: containers did not start within \${MAX_WAIT}s"
              docker compose logs --tail=100
              exit 1
            fi

            # ── Final status ────────────────────────────────────────────────
            echo "=== Running containers ==="
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

            echo "=== Recent logs ==="
            docker compose logs --tail=30

            echo "=== Deploy \$DEPLOY_SHA complete ==="

          ENDSSH